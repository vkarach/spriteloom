<!doctype html>
<meta charset="utf-8">
<title>Spriteloom</title>
<link rel="stylesheet" href="style.css">

<div id="stage">
  <div class="brand"><i></i>SPRITELOOM<span id="ver"></span>
    <button id="setupbtn" class="ghost"><svg class="gear" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12"
        r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1
        1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1
        1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0
        0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0
        .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6
        9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65
        1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65
        1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83
        2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51
        1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span
        id="navlbl">Setup</span></button>
  </div>
  <div class="note" id="note" hidden></div>

<div id="main-view">
  <div class="card">
    <div class="row">
      <span class="dot" id="dot"></span>
      <span class="label" id="label">Checking</span>
    </div>
    <div class="addr" id="addr"></div>
    <div class="bar" id="bar"><i id="barfill"></i></div>
    <button id="toggle">START</button>
    <div class="hint" id="hint"></div>
  </div>

  <div class="card plugin">
    <span class="txt">ASEPRITE PLUGIN</span>
    <span class="ver" id="plug"></span>
    <button class="ghost" id="install">Install</button>
  </div>

  <div class="credit">
    <span class="rule"></span>
    <span class="who"><a id="author" href="https://github.com/vkarach">Valentyn Karachevtsev</a><span class="year">2026</span></span>
  </div>
</div>

<div id="setup-view" hidden>
  <div class="card">
    <div class="rows" id="setuprows"></div>
    <button id="installbtn" disabled>INSTALL SELECTED</button>
  </div>

  <div class="card" id="pathsbox">
    <div class="summary" id="pathstoggle">PATHS</div>
    <div class="collapser" id="pathswrap"><div id="setuppaths"></div></div>
  </div>

  <div class="card" id="vramcard">
    <div class="opt">
      <label for="vram">VRAM mode</label>
      <select id="vram">
        <option value="auto">Auto · detect the card</option>
        <option value="bf16">bf16 · 12 GB and up</option>
        <option value="fp8">fp8 · 8 GB, fast</option>
        <option value="offload">offload · 8 GB, slow</option>
      </select>
    </div>
  </div>
</div>
</div>

<div id="rail" title="Show or hide the log"><span class="chev"></span></div>
<div id="logpanel">
  <div class="loghead">LOG</div>
  <pre id="logbox"></pre>
</div>

<script src="app.js"></script>
