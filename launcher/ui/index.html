<!doctype html>
<meta charset="utf-8">
<title>SpriteForge</title>
<style>
  :root {
    /* native controls follow the page, not the light system default */
    color-scheme: dark;
    --bg: #14161c; --panel: #20242f; --line: #2c313d;
    --ink: #d3d7e0; --ink-dim: #8b93a5; --ink-faint: #616a7d;
    --gold: #f2b23c; --danger: #e8705a; --ok: #6fcf7f;
    --mono: ui-monospace, "Cascadia Code", Consolas, monospace;
  }
  * { box-sizing: border-box; }
  /* paint the whole surface so a mid-resize gap is dark, not see-through */
  html { background: var(--bg); }
  /* WebView2 ships the light system scrollbar; repaint it for the dark panel */
  * { scrollbar-width: thin; scrollbar-color: var(--line) transparent; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: var(--line); border-radius: 5px;
    border: 2px solid transparent; background-clip: content-box;
  }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-faint); background-clip: content-box; }
  ::-webkit-scrollbar-corner { background: transparent; }
  body {
    margin: 0; padding: 22px; background: var(--bg); color: var(--ink);
    font-family: var(--mono); font-size: 13px; line-height: 1.45;
    user-select: none; -webkit-user-select: none; cursor: default;
  }
  .brand {
    display: flex; align-items: center; gap: 14px;
    font-weight: 700; letter-spacing: 0.09em; font-size: 14px;
  }
  /* same pixel spark as the landing page: two gold, one red */
  .brand i {
    width: 12px; height: 12px; background: var(--gold); display: inline-block;
    box-shadow: 4px 0 0 var(--gold), 0 4px 0 var(--danger);
  }
  .brand span {
    color: var(--ink-faint); font-weight: 400; margin-left: auto;
    letter-spacing: 0; flex: none;
  }
  #setupbtn {
    width: auto; margin: 0 0 0 12px; padding: 6px 12px; font-size: 12.5px;
    font-weight: 400; letter-spacing: 0.02em; background: transparent;
    color: var(--ink); border: 1px solid var(--line); flex: none;
    display: inline-flex; align-items: center; gap: 7px;
  }
  #setupbtn .gear { width: 13px; height: 13px; flex: none; }
  #setupbtn:hover:not(:disabled) { border-color: var(--ink-faint); filter: none; }
  /* a cold start should catch the eye, not twitch: keep the red on hover too */
  #setupbtn.cold, #setupbtn.cold:hover:not(:disabled) {
    color: var(--danger); border-color: var(--danger);
    animation: glow 2.6s ease-in-out infinite, hop 2.6s ease-in-out infinite;
  }
  @keyframes glow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(232, 112, 90, 0); }
    50% { box-shadow: 0 0 8px 0 rgba(232, 112, 90, 0.32); }
  }
  @keyframes hop {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-1.5px); }
  }
  /* the main screen should breathe, not sit as a short stub */
  #main-view { min-height: 404px; }
  /* shown when Setup is blocked because the server is up */
  .note {
    margin: 13px 0 0; padding: 9px 12px; font-size: 12.5px; color: var(--gold);
    background: rgba(242, 178, 60, 0.12); border-left: 3px solid var(--gold);
    border-radius: 0 6px 6px 0;
  }
  #backbtn { width: auto; margin: 0; padding: 6px 13px; font-size: 12.5px;
             font-weight: 400; letter-spacing: 0.02em; }
  /* install log rides in a second column; layout follows the real window
     width so a class toggle never lays out two columns in a narrow window */
  .setup-side { display: none; }
  .setup-side .head {
    color: var(--ink-dim); font-size: 12px; letter-spacing: 0.06em;
    margin-bottom: 8px;
  }
  .setup-side pre { margin: 0; height: auto; min-height: 360px; }
  @media (min-width: 700px) {
    .setup-body {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
      align-items: start;
    }
    .setup-side { display: block; }
  }
  /* PATHS collapses so long paths do not stretch the screen */
  #pathsbox summary { color: var(--ink-dim); letter-spacing: 0.06em; }
  #pathsbox[open] summary { margin-bottom: 4px; }
  .prow .reset { padding: 4px 9px; font-size: 13px; line-height: 1; }
  .screen-title {
    margin-left: 12px; font-family: var(--mono); font-weight: 700;
    letter-spacing: 0.08em; font-size: 14px;
  }
  #setup-view .opt { margin-top: 0; padding-top: 0; border-top: 0; }
  #setup-view .card { margin-top: 12px; }
  .srow {
    display: flex; align-items: center; gap: 10px; padding: 8px 0;
    border-bottom: 1px solid var(--line); font-size: 13px;
  }
  .srow:last-child { border-bottom: 0; }
  .srow .name { flex: 1; min-width: 0; overflow-wrap: anywhere; }
  .srow .detail { color: var(--ink-faint); flex: none; font-size: 12px; }
  .srow.ok .mark { color: var(--ok); }
  .srow.blocked { opacity: 0.5; }
  .srow.failed .detail { color: var(--danger); }
  .srow.running .detail, .srow.cancelled .detail { color: var(--gold); }
  .srow .mark { width: 15px; flex: none; text-align: center; color: var(--ink-faint); }
  .srow input { flex: none; width: 15px; height: 15px; accent-color: var(--gold); }
  #installbtn { margin-top: 14px; }
  .prow { display: flex; align-items: center; gap: 10px; padding: 7px 0; }
  .prow .pname { color: var(--ink-dim); flex: none; width: 68px; font-size: 12px; }
  .prow .pval { flex: 1; min-width: 0; overflow-wrap: anywhere; color: var(--ink-faint); font-size: 12px; }
  .prow.warn .pval { color: var(--gold); }
  .prow button { padding: 4px 10px; font-size: 11.5px; flex: none; }
  .hint { overflow-wrap: anywhere; }
  .card {
    margin-top: 16px; background: var(--panel);
    border: 1px solid var(--line); border-radius: 8px; padding: 18px;
  }
  .row { display: flex; align-items: center; gap: 11px; }
  .dot {
    width: 11px; height: 11px; border-radius: 50%;
    background: var(--ink-faint); flex: none;
  }
  .dot.busy { background: var(--gold); animation: pulse 1.1s infinite; }
  .dot.ready { background: var(--ok); }
  .dot.error { background: var(--danger); }
  @keyframes pulse { 50% { opacity: 0.22; } }
  /* at the minimum width long stages and paths wrap instead of colliding */
  .label { font-size: 14px; min-width: 0; overflow-wrap: anywhere; }
  .addr {
    margin-top: 5px; margin-left: 22px; color: var(--ink-faint);
    overflow-wrap: anywhere;
  }
  .bar {
    margin-top: 13px; height: 4px; background: var(--line);
    border-radius: 2px; overflow: hidden; display: none;
  }
  .bar.on { display: block; }
  .bar i {
    display: block; height: 100%; width: 0; background: var(--gold);
    transition: width 0.3s;
  }
  button {
    width: 100%; margin-top: 16px; padding: 13px; cursor: pointer;
    font-family: var(--mono); font-size: 13px; font-weight: 700;
    letter-spacing: 0.09em; color: #14161c; background: var(--gold);
    border: 0; border-radius: 6px;
  }
  button:hover:not(:disabled) { filter: brightness(1.09); }
  button:disabled {
    background: var(--line); color: var(--ink-faint); cursor: default;
  }
  button.ghost {
    background: transparent; color: var(--ink); border: 1px solid var(--line);
    width: auto; margin: 0; padding: 8px 15px; font-weight: 400;
    letter-spacing: 0.02em; flex: none;
  }
  button.ghost:hover:not(:disabled) { border-color: var(--ink-faint); filter: none; }
  .opt { margin-top: 15px; padding-top: 14px; border-top: 1px solid var(--line); }
  .opt label {
    display: block; color: var(--ink-dim); font-size: 12px;
    letter-spacing: 0.04em; margin-bottom: 7px;
  }
  /* full width: a select sized by its longest option jumps around as the
     label changes, and clips whatever does not fit */
  .opt select {
    width: 100%; font-family: var(--mono); font-size: 13px; color: var(--ink);
    background: var(--bg); border: 1px solid var(--line); border-radius: 6px;
    padding: 9px 10px; cursor: pointer;
  }
  .opt select:hover { border-color: var(--ink-faint); }
  /* stacked, not a single squat line: the card reads as a block like the
     server card above it */
  .plugin .txt {
    display: block; font-size: 12px; color: var(--ink-dim);
    letter-spacing: 0.04em; margin-bottom: 7px;
  }
  .plugin .ver { display: block; color: var(--ink); font-size: 14px;
                 margin-top: 5px; letter-spacing: 0; overflow-wrap: anywhere; }
  .plugin .ver.warn { color: var(--gold); }
  .plugin button { width: 100%; margin-top: 13px; }
  details { margin-top: 16px; }
  summary { cursor: pointer; color: var(--ink-dim); list-style: none; }
  summary::-webkit-details-marker { display: none; }
  summary::before {
    content: "\25B8"; display: inline-block; width: 9px; margin-right: 9px;
    color: var(--ink-faint);
  }
  details[open] summary::before { content: "\25BE"; }
  pre {
    margin: 10px 6px 0; padding: 11px; height: 200px; overflow: auto;
    background: #0f1116; border: 1px solid var(--line); border-radius: 6px;
    font-size: 11.5px; color: var(--ink-dim); white-space: pre-wrap;
    word-break: break-word; user-select: text; -webkit-user-select: text;
  }
  .hint {
    margin-top: 13px; color: var(--gold); display: none; font-size: 12.5px;
  }
  .hint.on { display: block; }
  .hint.bad { color: var(--danger); }
</style>

<div id="main-view">
  <div class="brand"><i></i>SPRITEFORGE<span id="ver"></span>
    <button id="setupbtn" class="ghost"><svg class="gear" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12"
        r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1
        1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1
        1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0
        0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0
        .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6
        9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65
        1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65
        1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83
        2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51
        1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Setup</button>
  </div>
  <div class="note" id="note" hidden></div>

  <div class="card">
    <div class="row">
      <span class="dot" id="dot"></span>
      <span class="label" id="label">Checking</span>
    </div>
    <div class="addr" id="addr"></div>
    <div class="bar" id="bar"><i id="barfill"></i></div>
    <button id="toggle">START</button>
    <div class="hint" id="hint"></div>
  </div>

  <div class="card plugin">
    <span class="txt">ASEPRITE PLUGIN</span>
    <span class="ver" id="plug"></span>
    <button class="ghost" id="install">Install</button>
  </div>

  <details id="logbox">
    <summary>Log</summary>
    <pre id="log"></pre>
  </details>
</div>

<div id="setup-view" hidden>
  <div class="brand">
    <button id="backbtn" class="ghost">← Back</button>
    <span class="screen-title">SETUP</span>
  </div>

  <div class="setup-body">
    <div class="setup-main">
      <div class="card">
        <div class="rows" id="setuprows"></div>
        <button id="installbtn" disabled>INSTALL SELECTED</button>
      </div>

      <details class="card" id="pathsbox">
        <summary>PATHS</summary>
        <div id="setuppaths"></div>
      </details>

      <div class="card">
        <div class="opt">
          <label for="vram">VRAM mode</label>
          <select id="vram">
            <option value="auto">Auto · detect the card</option>
            <option value="bf16">bf16 · 12 GB and up</option>
            <option value="fp8">fp8 · 8 GB, fast</option>
            <option value="offload">offload · 8 GB, slow</option>
          </select>
        </div>
      </div>
    </div>

    <div class="setup-side card">
      <div class="head">INSTALL LOG</div>
      <pre id="setuplog"></pre>
    </div>
  </div>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  let busy = false;
  let sawError = false;

  function paint(s) {
    lastRunning = s.running;
    $("ver").textContent = s.version;
    $("addr").textContent = s.url;
    $("dot").className = "dot " + s.tone;
    $("label").textContent = s.label;
    $("toggle").textContent = s.running ? "STOP" : "START";
    $("toggle").disabled = busy || !s.can_start;
    $("bar").className = s.progress > 0 ? "bar on" : "bar";
    $("barfill").style.width = Math.round(s.progress * 100) + "%";
    $("hint").className = s.hint ? (s.hint_bad ? "hint on bad" : "hint on") : "hint";
    $("hint").textContent = s.hint || "";
    $("plug").textContent = s.plugin_text;
    $("plug").className = s.plugin_warn ? "ver warn" : "ver";
    $("install").textContent = s.plugin_action;
    $("install").disabled = busy;
    // glow the moment the background check finds something missing, no click;
    // only rewrite when it changes so the animation never restarts mid tick
    const setupCls = "ghost" + (s.cold ? " cold" : "");
    if ($("setupbtn").className !== setupCls) $("setupbtn").className = setupCls;
    // never yank the list out from under an open dropdown
    if (document.activeElement !== $("vram")) $("vram").value = s.vram_mode;

    const log = $("log");
    if (log.textContent !== s.log) {
      const stuck = log.scrollTop + log.clientHeight >= log.scrollHeight - 24;
      log.textContent = s.log;
      if (stuck) log.scrollTop = log.scrollHeight;
    }
    // open the log once, the first time something breaks
    if (s.tone === "error" && !sawError) { sawError = true; $("logbox").open = true; }
    if (s.tone !== "error") sawError = false;
    fit();
  }

  async function call(action) {
    busy = true;
    $("toggle").disabled = true;
    $("install").disabled = true;
    try { paint(await action()); } finally { busy = false; }
  }

  $("toggle").onclick = () => call(window.pywebview.api.toggle_server);
  $("install").onclick = () => call(window.pywebview.api.install_plugin);
  $("vram").onchange = async () => {
    await window.pywebview.api.set_vram_mode($("vram").value);
    setupTick();
  };

  // ---- setup screen

  const PATH_LABELS = {root: "Project", python: "Python",
                       aseprite_dir: "Aseprite", models_dir: "Model"};
  const chosen = new Set();
  let onSetup = false;
  let installing = false;
  let wantWide = false;
  let lastRunning = false;
  let noteTimer = 0;

  // the install log lives in a second column; ask for the wide window and let
  // fit() apply width and height in one resize
  function setWide(on) {
    if (on === wantWide) return;
    wantWide = on;
    fit();
  }

  function showNote(msg) {
    const n = $("note");
    n.textContent = msg;
    n.hidden = false;
    clearTimeout(noteTimer);
    noteTimer = setTimeout(() => { n.hidden = true; fit(); }, 4500);
    fit();
  }

  function mark(item) {
    if (item.step_state === "running") return "…";
    if (item.step_state === "done" || item.state === "ok") return "✓";
    if (item.step_state === "failed") return "✕";
    if (item.state === "blocked") return "·";
    return "";
  }

  function setupPaint(s) {
    if (document.activeElement !== $("vram")) $("vram").value = s.vram_mode;
    installing = s.running;
    $("setupbtn").className = "ghost" + (s.cold ? " cold" : "");

    const rows = $("setuprows");
    rows.innerHTML = "";
    for (const item of s.items) {
      const row = document.createElement("div");
      row.className = "srow " + (item.step_state || item.state);
      // a failed step keeps its checkbox so you can fix and run it again
      const actionable = item.state !== "ok" && item.state !== "blocked"
        && (!item.step_state || item.step_state === "failed");
      if (actionable && !s.running) {
        const box = document.createElement("input");
        box.type = "checkbox";
        box.checked = chosen.has(item.id);
        box.onchange = () => {
          box.checked ? chosen.add(item.id) : chosen.delete(item.id);
          setupPaint(s);
        };
        row.appendChild(box);
      } else {
        const m = document.createElement("span");
        m.className = "mark";
        m.textContent = mark(item);
        row.appendChild(m);
      }
      const name = document.createElement("span");
      name.className = "name";
      name.textContent = item.label;
      const detail = document.createElement("span");
      detail.className = "detail";
      detail.textContent = item.step_detail || item.detail;
      row.append(name, detail);
      rows.appendChild(row);
    }

    const paths = $("setuppaths");
    paths.innerHTML = "";
    for (const [kind, label] of Object.entries(PATH_LABELS)) {
      const row = document.createElement("div");
      row.className = "prow" + (s.paths[kind] ? "" : " warn");
      const name = document.createElement("span");
      name.className = "pname";
      name.textContent = label;
      const val = document.createElement("span");
      val.className = "pval";
      val.textContent = s.paths[kind] || "not found";
      row.append(name, val);
      // a manual path can go back to auto-detect
      if ((s.overrides || []).includes(kind)) {
        const undo = document.createElement("button");
        undo.className = "ghost reset";
        undo.textContent = "↺";
        undo.title = "Reset to auto-detect";
        undo.disabled = s.running;
        undo.onclick = async () => setupPaint(await window.pywebview.api
                                                .reset_path(kind));
        row.append(undo);
      }
      const pick = document.createElement("button");
      pick.className = "ghost";
      pick.textContent = "Choose";
      pick.disabled = s.running;
      pick.onclick = async () => setupPaint(await window.pywebview.api
                                              .choose_path(kind));
      row.append(pick);
      paths.appendChild(row);
    }

    const btn = $("installbtn");
    btn.textContent = s.running ? "CANCEL"
      : (s.checking ? "CHECKING…" : "INSTALL SELECTED (" + chosen.size + ")");
    btn.disabled = !s.running && (s.checking || chosen.size === 0);

    const log = $("setuplog");
    // Python reprs a bad path with doubled backslashes; show single
    const text = s.log.replace(/\\\\/g, "\\");
    if (log.textContent !== text) {
      const stuck = log.scrollTop + log.clientHeight >= log.scrollHeight - 24;
      log.textContent = text;
      if (stuck) log.scrollTop = log.scrollHeight;
    }
    // no log until you install: keep the window narrow, widen for the side
    // column once a run has something to show
    setWide(!!s.log);
    fit();
  }

  $("installbtn").onclick = async () => {
    const api = window.pywebview.api;
    setupPaint(await (installing ? api.cancel_install()
                                 : api.install([...chosen])));
  };

  function showScreen(setup) {
    onSetup = setup;
    $("main-view").hidden = setup;
    $("setup-view").hidden = !setup;
    if (setup) setupTick();
    else setWide(false);
    fit();
  }
  $("setupbtn").onclick = () => {
    // installing over a live server would fight it for the GPU
    if (lastRunning) {
      showNote("Stop the server before opening Setup.");
      return;
    }
    $("note").hidden = true;
    showScreen(true);
  };
  $("backbtn").onclick = () => showScreen(false);

  async function setupTick() {
    if (!onSetup) return;
    setupPaint(await window.pywebview.api.setup_state());
  }

  async function tick() {
    if (busy || onSetup) return;
    paint(await window.pywebview.api.state());
  }

  // the page measures itself and the window follows, so opening the log or
  // showing a hint never leaves a gap or a cut off line
  let fitting = false;
  function fit() {
    if (fitting) return;
    fitting = true;
    requestAnimationFrame(() => {
      fitting = false;
      const delta = document.body.scrollHeight - window.innerHeight;
      const needWidth = (window.innerWidth > 640) !== wantWide;
      if (delta !== 0 || needWidth)
        window.pywebview.api.relayout(delta, wantWide);
    });
  }

  $("logbox").addEventListener("toggle", fit);
  $("pathsbox").addEventListener("toggle", fit);

  window.addEventListener("pywebviewready", () => {
    tick();
    setInterval(() => { onSetup ? setupTick() : tick(); }, 1000);
  });
</script>
